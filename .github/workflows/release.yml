name: Release Obsidian plugin

# Bouwt automatisch een GitHub Release met de drie plugin-bestanden als
# assets, zodat BRAT de nieuwe versie ziet en op desktop én mobiel kan
# installeren/updaten. Twee manieren om te starten:
#   1. Een versietag pushen (bv. 1.7.0).
#   2. Handmatig draaien via "Run workflow" met de versie als invoer
#      (maakt de tag zelf aan op de gekozen branch).
on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Versietag, bv. 1.7.0"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Gebruik release-notes.md als release-tekst (zo zien gebruikers in
          # Obsidian/BRAT wat er nieuw is); val terug op een generieke tekst.
          if [ -f release-notes.md ]; then
            NOTES=(--notes-file release-notes.md)
          else
            NOTES=(--notes="Automated release for $TAG. See the README for details.")
          fi
          gh release create "$TAG" \
            --title="$TAG" \
            "${NOTES[@]}" \
            --target="$GITHUB_SHA" \
            main.js manifest.json styles.css
