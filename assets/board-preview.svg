<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1280" height="760" fill="#202024"/>

  <!-- header -->
  <rect x="0" y="0" width="1280" height="56" fill="#1b1b1d"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#303034" stroke-width="1"/>
  <text x="24" y="35" fill="#e7e7ea" font-size="19" font-weight="600">Kanban board</text>
  <!-- filter -->
  <rect x="210" y="14" width="240" height="28" rx="6" fill="#161618" stroke="#303034"/>
  <text x="225" y="33" fill="#6d6d75" font-size="13">Filter tasks…</text>
  <!-- hide done -->
  <rect x="470" y="20" width="15" height="15" rx="3" fill="#161618" stroke="#3a3a40"/>
  <text x="492" y="33" fill="#9a9aa2" font-size="13">Hide done</text>
  <!-- refresh + new task -->
  <rect x="1044" y="12" width="34" height="32" rx="6" fill="#161618" stroke="#303034"/>
  <text x="1061" y="34" fill="#c9c9cf" font-size="17" text-anchor="middle">↻</text>
  <rect x="1090" y="12" width="166" height="32" rx="6" fill="#8b5cf6"/>
  <text x="1173" y="33" fill="#ffffff" font-size="13.5" font-weight="600" text-anchor="middle">+ New task</text>

  <!-- ===================== COLUMN: To do ===================== -->
  <g>
    <rect x="24" y="72" width="290" height="672" rx="10" fill="#161618"/>
    <text x="40" y="101" fill="#e7e7ea" font-size="14" font-weight="600">To do</text>
    <rect x="278" y="88" width="22" height="18" rx="9" fill="#2a2a2e"/>
    <text x="289" y="101" fill="#b9b9c0" font-size="11" text-anchor="middle">2</text>
    <line x1="40" y1="116" x2="298" y2="116" stroke="#2a2a2e" stroke-width="1"/>

    <!-- card A -->
    <g filter="url(#cardShadow)">
      <rect x="38" y="130" width="262" height="104" rx="8" fill="#2a2a2e" stroke="#37373d"/>
      <rect x="38" y="130" width="4" height="104" rx="2" fill="#3b82f6"/>
      <rect x="54" y="144" width="46" height="19" rx="9.5" fill="#3b82f6"/>
      <text x="77" y="157" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">aim</text>
      <text x="54" y="190" fill="#e7e7ea" font-size="14.5">Draft quote</text>
      <rect x="54" y="204" width="92" height="20" rx="6" fill="#202024" stroke="#3a3a40"/>
      <text x="64" y="218" fill="#c9c9cf" font-size="11.5">Due 25 May</text>
      <rect x="154" y="204" width="52" height="20" rx="6" fill="#3a2a12"/>
      <text x="180" y="218" fill="#f3b552" font-size="11.5" text-anchor="middle">High</text>
    </g>

    <!-- card B -->
    <g filter="url(#cardShadow)">
      <rect x="38" y="246" width="262" height="120" rx="8" fill="#2a2a2e" stroke="#37373d"/>
      <rect x="38" y="246" width="4" height="120" rx="2" fill="#a855f7"/>
      <text x="54" y="270" fill="#8b8b93" font-size="11">client ›</text>
      <rect x="108" y="258" width="58" height="19" rx="9.5" fill="#a855f7"/>
      <text x="137" y="271" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">acme</text>
      <text x="280" y="271" fill="#6f6f77" font-size="14" text-anchor="end">📄</text>
      <text x="54" y="304" fill="#e7e7ea" font-size="14.5">Onboarding call with client</text>
      <rect x="54" y="322" width="66" height="20" rx="6" fill="#202024" stroke="#3a3a40"/>
      <path d="M62 332 l3 3 l5 -6" fill="none" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="336" fill="#c9c9cf" font-size="11.5">1/2</text>
      <text x="54" y="356" fill="#6f6f77" font-size="11">↳ Clients</text>
    </g>

    <rect x="38" y="378" width="262" height="30" rx="7" fill="none" stroke="#2c2c31" stroke-dasharray="4 4"/>
    <text x="169" y="397" fill="#6d6d75" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: In progress ===================== -->
  <g>
    <rect x="330" y="72" width="290" height="672" rx="10" fill="#161618"/>
    <text x="346" y="101" fill="#e7e7ea" font-size="14" font-weight="600">In progress</text>
    <rect x="584" y="88" width="22" height="18" rx="9" fill="#2a2a2e"/>
    <text x="595" y="101" fill="#b9b9c0" font-size="11" text-anchor="middle">2</text>
    <line x1="346" y1="116" x2="604" y2="116" stroke="#2a2a2e" stroke-width="1"/>

    <!-- card C (due today) -->
    <g filter="url(#cardShadow)">
      <rect x="344" y="130" width="262" height="104" rx="8" fill="#2a2a2e" stroke="#37373d"/>
      <rect x="344" y="130" width="4" height="104" rx="2" fill="#10b981"/>
      <rect x="360" y="144" width="48" height="19" rx="9.5" fill="#10b981"/>
      <text x="384" y="157" fill="#06281d" font-size="11" font-weight="700" text-anchor="middle">beta</text>
      <text x="360" y="190" fill="#e7e7ea" font-size="14.5">Prepare presentation</text>
      <rect x="360" y="204" width="86" height="20" rx="6" fill="#3a2a12" stroke="#7a5a1e"/>
      <text x="403" y="218" fill="#f3b552" font-size="11.5" text-anchor="middle">Due today</text>
      <rect x="454" y="204" width="52" height="20" rx="6" fill="#3a1212"/>
      <text x="480" y="218" fill="#f07070" font-size="11.5" text-anchor="middle">Highest</text>
    </g>

    <!-- card D (recurring) -->
    <g filter="url(#cardShadow)">
      <rect x="344" y="246" width="262" height="92" rx="8" fill="#2a2a2e" stroke="#37373d"/>
      <text x="360" y="282" fill="#e7e7ea" font-size="14.5">Write weekly blog post</text>
      <rect x="360" y="298" width="116" height="20" rx="6" fill="#202024" stroke="#3a3a40"/>
      <text x="372" y="312" fill="#c9c9cf" font-size="11.5">↻ Repeats weekly</text>
    </g>

    <rect x="344" y="350" width="262" height="30" rx="7" fill="none" stroke="#2c2c31" stroke-dasharray="4 4"/>
    <text x="475" y="369" fill="#6d6d75" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: Waiting for response ===================== -->
  <g>
    <rect x="636" y="72" width="290" height="672" rx="10" fill="#161618"/>
    <text x="652" y="101" fill="#e7e7ea" font-size="14" font-weight="600">Waiting for response</text>
    <rect x="890" y="88" width="22" height="18" rx="9" fill="#2a2a2e"/>
    <text x="901" y="101" fill="#b9b9c0" font-size="11" text-anchor="middle">1</text>
    <line x1="652" y1="116" x2="910" y2="116" stroke="#2a2a2e" stroke-width="1"/>

    <!-- card E -->
    <g filter="url(#cardShadow)">
      <rect x="650" y="130" width="262" height="104" rx="8" fill="#2a2a2e" stroke="#37373d"/>
      <rect x="650" y="130" width="4" height="104" rx="2" fill="#a855f7"/>
      <text x="666" y="154" fill="#8b8b93" font-size="11">client ›</text>
      <rect x="720" y="142" width="58" height="19" rx="9.5" fill="#a855f7"/>
      <text x="749" y="155" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">acme</text>
      <text x="666" y="190" fill="#e7e7ea" font-size="14.5">Await quote approval</text>
      <rect x="666" y="204" width="84" height="20" rx="6" fill="#202024" stroke="#3a3a40"/>
      <text x="676" y="218" fill="#c9c9cf" font-size="11.5">Due 2 Jun</text>
    </g>

    <rect x="650" y="246" width="262" height="30" rx="7" fill="none" stroke="#2c2c31" stroke-dasharray="4 4"/>
    <text x="781" y="265" fill="#6d6d75" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: Done ===================== -->
  <g>
    <rect x="942" y="72" width="290" height="672" rx="10" fill="#161618"/>
    <text x="958" y="101" fill="#e7e7ea" font-size="14" font-weight="600">Done</text>
    <rect x="1196" y="88" width="22" height="18" rx="9" fill="#2a2a2e"/>
    <text x="1207" y="101" fill="#b9b9c0" font-size="11" text-anchor="middle">1</text>
    <line x1="958" y1="116" x2="1216" y2="116" stroke="#2a2a2e" stroke-width="1"/>

    <!-- card F (done) -->
    <g filter="url(#cardShadow)" opacity="0.72">
      <rect x="956" y="130" width="262" height="92" rx="8" fill="#26262a" stroke="#34343a"/>
      <rect x="956" y="130" width="4" height="92" rx="2" fill="#10b981"/>
      <rect x="972" y="150" width="16" height="16" rx="4" fill="#10b981"/>
      <path d="M976 158 l3 3 l6 -7" fill="none" stroke="#06281d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="998" y="163" fill="#9a9aa2" font-size="14" text-decoration="line-through">Send invoice</text>
      <rect x="998" y="178" width="48" height="19" rx="9.5" fill="#10b981"/>
      <text x="1022" y="191" fill="#06281d" font-size="11" font-weight="700" text-anchor="middle">beta</text>
    </g>

    <rect x="956" y="234" width="262" height="30" rx="7" fill="none" stroke="#2c2c31" stroke-dasharray="4 4"/>
    <text x="1087" y="253" fill="#6d6d75" font-size="12" text-anchor="middle">+ Add task</text>
  </g>
</svg>
