<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadowL" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1f2329" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>

  <!-- header -->
  <rect x="0" y="0" width="1280" height="56" fill="#f7f8fa"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#e3e5e9" stroke-width="1"/>
  <text x="24" y="35" fill="#1f2329" font-size="19" font-weight="600">Kanban board</text>
  <!-- filter -->
  <rect x="210" y="14" width="240" height="28" rx="6" fill="#ffffff" stroke="#d8dbe0"/>
  <text x="225" y="33" fill="#9aa0a8" font-size="13">Filter tasks…</text>
  <!-- hide done -->
  <rect x="470" y="20" width="15" height="15" rx="3" fill="#ffffff" stroke="#c7ccd3"/>
  <text x="492" y="33" fill="#5b616b" font-size="13">Hide done</text>
  <!-- refresh + new task -->
  <rect x="1044" y="12" width="34" height="32" rx="6" fill="#ffffff" stroke="#d8dbe0"/>
  <text x="1061" y="34" fill="#4b5159" font-size="17" text-anchor="middle">↻</text>
  <rect x="1090" y="12" width="166" height="32" rx="6" fill="#8b5cf6"/>
  <text x="1173" y="33" fill="#ffffff" font-size="13.5" font-weight="600" text-anchor="middle">+ New task</text>

  <!-- ===================== COLUMN: To do ===================== -->
  <g>
    <rect x="24" y="72" width="290" height="672" rx="10" fill="#eef0f3"/>
    <text x="40" y="101" fill="#1f2329" font-size="14" font-weight="600">To do</text>
    <rect x="278" y="88" width="22" height="18" rx="9" fill="#dfe2e7"/>
    <text x="289" y="101" fill="#5b616b" font-size="11" text-anchor="middle">2</text>
    <line x1="40" y1="116" x2="298" y2="116" stroke="#dfe2e7" stroke-width="1"/>

    <!-- card A (blue) -->
    <g filter="url(#cardShadowL)">
      <rect x="38" y="130" width="262" height="104" rx="8" fill="#e9f1fe" stroke="#cfe0fb"/>
      <rect x="38" y="130" width="4" height="104" rx="2" fill="#3b82f6"/>
      <rect x="54" y="144" width="46" height="19" rx="9.5" fill="#3b82f6"/>
      <text x="77" y="157" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">aim</text>
      <text x="54" y="190" fill="#1f2329" font-size="14.5">Draft quote</text>
      <rect x="54" y="204" width="92" height="20" rx="6" fill="#ffffff" stroke="#cfd4da"/>
      <text x="64" y="218" fill="#4b5159" font-size="11.5">Due 25 May</text>
      <rect x="154" y="204" width="52" height="20" rx="6" fill="#fbeccb"/>
      <text x="180" y="218" fill="#9a6a06" font-size="11.5" text-anchor="middle">High</text>
    </g>

    <!-- card B (purple) -->
    <g filter="url(#cardShadowL)">
      <rect x="38" y="246" width="262" height="120" rx="8" fill="#f4eafe" stroke="#e6cffb"/>
      <rect x="38" y="246" width="4" height="120" rx="2" fill="#a855f7"/>
      <text x="54" y="270" fill="#7a818c" font-size="11">client ›</text>
      <rect x="108" y="258" width="58" height="19" rx="9.5" fill="#a855f7"/>
      <text x="137" y="271" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">acme</text>
      <text x="280" y="271" fill="#9aa0a8" font-size="14" text-anchor="end">📄</text>
      <text x="54" y="304" fill="#1f2329" font-size="14.5">Onboarding call with client</text>
      <rect x="54" y="322" width="66" height="20" rx="6" fill="#ffffff" stroke="#cfd4da"/>
      <path d="M62 332 l3 3 l5 -6" fill="none" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="336" fill="#4b5159" font-size="11.5">1/2</text>
      <text x="54" y="356" fill="#9aa0a8" font-size="11">↳ Clients</text>
    </g>

    <rect x="38" y="378" width="262" height="30" rx="7" fill="none" stroke="#d3d7dd" stroke-dasharray="4 4"/>
    <text x="169" y="397" fill="#9aa0a8" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: In progress ===================== -->
  <g>
    <rect x="330" y="72" width="290" height="672" rx="10" fill="#eef0f3"/>
    <text x="346" y="101" fill="#1f2329" font-size="14" font-weight="600">In progress</text>
    <rect x="584" y="88" width="22" height="18" rx="9" fill="#dfe2e7"/>
    <text x="595" y="101" fill="#5b616b" font-size="11" text-anchor="middle">2</text>
    <line x1="346" y1="116" x2="604" y2="116" stroke="#dfe2e7" stroke-width="1"/>

    <!-- card C (green, due today) -->
    <g filter="url(#cardShadowL)">
      <rect x="344" y="130" width="262" height="104" rx="8" fill="#e6f7f0" stroke="#c5ecdc"/>
      <rect x="344" y="130" width="4" height="104" rx="2" fill="#10b981"/>
      <rect x="360" y="144" width="48" height="19" rx="9.5" fill="#10b981"/>
      <text x="384" y="157" fill="#06281d" font-size="11" font-weight="700" text-anchor="middle">beta</text>
      <text x="360" y="190" fill="#1f2329" font-size="14.5">Prepare presentation</text>
      <rect x="360" y="204" width="86" height="20" rx="6" fill="#fcefcf" stroke="#e2b65e"/>
      <text x="403" y="218" fill="#9a6a06" font-size="11.5" text-anchor="middle">Due today</text>
      <rect x="454" y="204" width="52" height="20" rx="6" fill="#fbe0e0"/>
      <text x="480" y="218" fill="#c23b3b" font-size="11.5" text-anchor="middle">Highest</text>
    </g>

    <!-- card D (neutral, recurring) -->
    <g filter="url(#cardShadowL)">
      <rect x="344" y="246" width="262" height="92" rx="8" fill="#ffffff" stroke="#e2e4e8"/>
      <text x="360" y="282" fill="#1f2329" font-size="14.5">Write weekly blog post</text>
      <rect x="360" y="298" width="116" height="20" rx="6" fill="#f4f5f7" stroke="#d8dbe0"/>
      <text x="372" y="312" fill="#4b5159" font-size="11.5">↻ Repeats weekly</text>
    </g>

    <rect x="344" y="350" width="262" height="30" rx="7" fill="none" stroke="#d3d7dd" stroke-dasharray="4 4"/>
    <text x="475" y="369" fill="#9aa0a8" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: Waiting for response ===================== -->
  <g>
    <rect x="636" y="72" width="290" height="672" rx="10" fill="#eef0f3"/>
    <text x="652" y="101" fill="#1f2329" font-size="14" font-weight="600">Waiting for response</text>
    <rect x="890" y="88" width="22" height="18" rx="9" fill="#dfe2e7"/>
    <text x="901" y="101" fill="#5b616b" font-size="11" text-anchor="middle">1</text>
    <line x1="652" y1="116" x2="910" y2="116" stroke="#dfe2e7" stroke-width="1"/>

    <!-- card E (purple) -->
    <g filter="url(#cardShadowL)">
      <rect x="650" y="130" width="262" height="104" rx="8" fill="#f4eafe" stroke="#e6cffb"/>
      <rect x="650" y="130" width="4" height="104" rx="2" fill="#a855f7"/>
      <text x="666" y="154" fill="#7a818c" font-size="11">client ›</text>
      <rect x="720" y="142" width="58" height="19" rx="9.5" fill="#a855f7"/>
      <text x="749" y="155" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">acme</text>
      <text x="666" y="190" fill="#1f2329" font-size="14.5">Await quote approval</text>
      <rect x="666" y="204" width="84" height="20" rx="6" fill="#ffffff" stroke="#cfd4da"/>
      <text x="676" y="218" fill="#4b5159" font-size="11.5">Due 2 Jun</text>
    </g>

    <rect x="650" y="246" width="262" height="30" rx="7" fill="none" stroke="#d3d7dd" stroke-dasharray="4 4"/>
    <text x="781" y="265" fill="#9aa0a8" font-size="12" text-anchor="middle">+ Add task</text>
  </g>

  <!-- ===================== COLUMN: Done ===================== -->
  <g>
    <rect x="942" y="72" width="290" height="672" rx="10" fill="#eef0f3"/>
    <text x="958" y="101" fill="#1f2329" font-size="14" font-weight="600">Done</text>
    <rect x="1196" y="88" width="22" height="18" rx="9" fill="#dfe2e7"/>
    <text x="1207" y="101" fill="#5b616b" font-size="11" text-anchor="middle">1</text>
    <line x1="958" y1="116" x2="1216" y2="116" stroke="#dfe2e7" stroke-width="1"/>

    <!-- card F (done) -->
    <g filter="url(#cardShadowL)">
      <rect x="956" y="130" width="262" height="92" rx="8" fill="#eef0f3" stroke="#dcdfe4"/>
      <rect x="956" y="130" width="4" height="92" rx="2" fill="#10b981"/>
      <rect x="972" y="150" width="16" height="16" rx="4" fill="#10b981"/>
      <path d="M976 158 l3 3 l6 -7" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="998" y="163" fill="#9aa0a8" font-size="14" text-decoration="line-through">Send invoice</text>
      <rect x="998" y="178" width="48" height="19" rx="9.5" fill="#9fd9c4"/>
      <text x="1022" y="191" fill="#0a3a2a" font-size="11" font-weight="700" text-anchor="middle">beta</text>
    </g>

    <rect x="956" y="234" width="262" height="30" rx="7" fill="none" stroke="#d3d7dd" stroke-dasharray="4 4"/>
    <text x="1087" y="253" fill="#9aa0a8" font-size="12" text-anchor="middle">+ Add task</text>
  </g>
</svg>
