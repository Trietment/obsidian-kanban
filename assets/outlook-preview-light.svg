<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"><rect x="0" y="0" width="1280" height="760" fill="#ffffff"/><text x="200" y="56" fill="#1f2329" font-size="22" font-weight="700">Outlook calendar</text><text x="200" y="86" fill="#5b616b" font-size="13.5">Connect your Microsoft/Outlook calendar and show appointments next to your tasks (read-only).</text><rect x="200" y="120" width="880" height="78" fill="#f4f5f7" rx="10"/><text x="220" y="148" fill="#1f2329" font-size="15" font-weight="600">Microsoft Client ID</text><text x="220" y="170" fill="#5b616b" font-size="12.5">Application (client) ID of an Azure app registration. Empty = use the built-in Client ID.</text><rect x="850" y="142" width="210" height="34" fill="#ffffff" rx="6" stroke="#dfe2e7" stroke-width="1"/><text x="863" y="164" fill="#9aa0a8" font-size="12">Empty = use built-in Client ID</text><path d="M202 210 l3 3 l6 -7" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="220" y="218" fill="#16a34a" font-size="13">Built-in Client ID is active — you do not need to fill this in.</text><rect x="200" y="240" width="880" height="64" fill="#f4f5f7" rx="10"/><text x="220" y="268" fill="#1f2329" font-size="15" font-weight="600">Show Outlook events</text><text x="220" y="288" fill="#5b616b" font-size="12.5">Show the appointments from your connected calendar(s) in the calendar view.</text><rect x="1024" y="263" width="34" height="18" fill="#a855f7" rx="9"/><circle cx="1049" cy="272" r="6.5" fill="#ffffff"/><text x="200" y="326" fill="#1f2329" font-size="16" font-weight="700">Connected accounts</text><rect x="200" y="350" width="880" height="180" fill="#f4f5f7" rx="10"/><circle cx="222" cy="380" r="6" fill="#2563eb"/><text x="240" y="378" fill="#1f2329" font-size="14.5" font-weight="600">Sam (work)</text><text x="240" y="397" fill="#5b616b" font-size="12">sam@trietment.com</text><rect x="996" y="366" width="30" height="28" fill="#ffffff" rx="6" stroke="#dfe2e7" stroke-width="1"/><text x="1011" y="385" fill="#5b616b" font-size="14" text-anchor="middle">↻</text><rect x="1032" y="366" width="30" height="28" fill="#ffffff" rx="6" stroke="#dfe2e7" stroke-width="1"/><text x="1047" y="385" fill="#5b616b" font-size="12" text-anchor="middle">✕</text><circle cx="230" cy="419" r="5" fill="#2563eb"/><text x="246" y="423" fill="#1f2329" font-size="13">Calendar</text><rect x="1026" y="410" width="34" height="18" fill="#a855f7" rx="9"/><circle cx="1051" cy="419" r="6.5" fill="#ffffff"/><circle cx="230" cy="457" r="5" fill="#0891b2"/><text x="246" y="461" fill="#1f2329" font-size="13">Team agenda</text><text x="337" y="461" fill="#9aa0a8" font-size="11">shared</text><rect x="1026" y="448" width="34" height="18" fill="#a855f7" rx="9"/><circle cx="1051" cy="457" r="6.5" fill="#ffffff"/><circle cx="230" cy="495" r="5" fill="#16a34a"/><text x="246" y="499" fill="#1f2329" font-size="13">Holidays NL</text><text x="337" y="499" fill="#9aa0a8" font-size="11">shared</text><rect x="1026" y="486" width="34" height="18" fill="#cfd4da" rx="9"/><circle cx="1035" cy="495" r="6.5" fill="#ffffff"/><rect x="200" y="544" width="880" height="104" fill="#f4f5f7" rx="10"/><circle cx="222" cy="574" r="6" fill="#0891b2"/><text x="240" y="572" fill="#1f2329" font-size="14.5" font-weight="600">Sam prive</text><text x="240" y="591" fill="#5b616b" font-size="12">sam@outlook.com</text><rect x="996" y="560" width="30" height="28" fill="#ffffff" rx="6" stroke="#dfe2e7" stroke-width="1"/><text x="1011" y="579" fill="#5b616b" font-size="14" text-anchor="middle">↻</text><rect x="1032" y="560" width="30" height="28" fill="#ffffff" rx="6" stroke="#dfe2e7" stroke-width="1"/><text x="1047" y="579" fill="#5b616b" font-size="12" text-anchor="middle">✕</text><circle cx="230" cy="613" r="5" fill="#0891b2"/><text x="246" y="617" fill="#1f2329" font-size="13">Agenda</text><rect x="1026" y="604" width="34" height="18" fill="#a855f7" rx="9"/><circle cx="1051" cy="613" r="6.5" fill="#ffffff"/><rect x="200" y="662" width="880" height="64" fill="#f4f5f7" rx="10"/><text x="220" y="690" fill="#1f2329" font-size="15" font-weight="600">Connect account</text><text x="220" y="710" fill="#5b616b" font-size="12.5">Sign in with Microsoft. You can connect multiple accounts.</text><rect x="950" y="679" width="110" height="32" fill="#a855f7" rx="6"/><text x="1005" y="700" fill="#fff" font-size="13.5" font-weight="600" text-anchor="middle">Connect</text></svg>